<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f2ea" />
    <meta name="color-scheme" content="light dark" />
    <title>ROBOM HQ · 로봄 본부</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="hq" id="hq">
      <header class="topbar">
        <button class="icon-button mobile-only" id="menuBtn" type="button" aria-label="전체 메뉴 열기">☰</button>
        <button class="brand" type="button" data-screen="today" aria-label="오늘 화면으로 이동">
          <img class="brand-mark" src="./icon.svg" alt="" aria-hidden="true" />
          <span class="brand-copy"><strong>ROBOM HQ</strong><small>로봄 본부</small></span>
        </button>
        <div class="top-status">
          <span class="clock" id="clock">--:--</span>
          <span class="mode-badge" id="modeBadge">연결 확인 중</span>
          <button class="icon-button" id="refreshBtn" type="button" aria-label="회사 상태 새로고침">↻</button>
        </div>
      </header>

      <aside class="sidebar" id="sidebar" aria-label="로봄 본부 메뉴">
        <div class="sidebar-head">
          <span>회장 메뉴</span>
          <button class="icon-button mobile-only" id="menuCloseBtn" type="button" aria-label="메뉴 닫기">×</button>
        </div>
        <label class="nav-search"><span aria-hidden="true">⌕</span><input id="navSearch" type="search" placeholder="메뉴 검색" autocomplete="off" /></label>
        <nav id="sideNav"></nav>
        <div class="sidebar-foot"><div class="sync-note" id="syncNote">마지막 동기화 확인 중</div></div>
      </aside>

      <main id="screen" class="screen" tabindex="-1" aria-live="polite">
        <div class="loading"><span></span><b>회사 상태를 불러오는 중입니다.</b></div>
      </main>

      <nav class="tabbar" aria-label="모바일 주요 메뉴">
        <button class="tab active" type="button" data-screen="today"><span aria-hidden="true">⌂</span>오늘</button>
        <button class="tab" type="button" data-screen="apps"><span aria-hidden="true">▦</span>앱</button>
        <button class="tab" type="button" data-screen="tasks"><span aria-hidden="true">☷</span>업무</button>
        <button class="tab" type="button" data-screen="codex"><span aria-hidden="true">🤖</span>Codex</button>
        <button class="tab" type="button" id="moreBtn"><span aria-hidden="true">⋯</span>기록</button>
      </nav>
    </div>

    <div class="drawer-scrim" id="drawerScrim" hidden></div>

    <dialog class="modal" id="taskDialog" aria-labelledby="taskDialogTitle">
      <form method="dialog" id="taskForm">
        <div class="modal-head"><div><small>새 수정 요청</small><h2 id="taskDialogTitle">무엇을 고칠까요?</h2></div><button class="icon-button" type="button" data-dialog-close="taskDialog" aria-label="닫기">×</button></div>
        <label>1. 어느 앱인가요?<select name="appId" id="taskApp" required></select></label>
        <label>2. 한 줄로 요약하면?<input name="title" id="taskTitle" required maxlength="120" placeholder="예: 접수 버튼 글자가 안 보여요" /></label>
        <label>3. 무엇이 불편한가요?<textarea name="problem" id="taskProblem" rows="3" maxlength="2000" placeholder="어디서, 어떤 상황에서 불편한지 말하듯 적어 주세요."></textarea></label>
        <label>4. 어떻게 되면 만족하나요?<textarea name="desiredOutcome" id="taskOutcome" rows="2" maxlength="2000" placeholder="예: 버튼 글자가 흰색으로 또렷하게 보이면 좋겠어요."></textarea></label>
        <label>5. 꼭 유지해야 하는 것은? <small>(비우면 기본 보호 규칙 적용)</small><input name="mustPreserve" id="taskPreserve" maxlength="500" placeholder="예: 지금 저장된 즐겨찾기" /></label>
        <label>6. 어디까지 자동으로 진행할까요?<select name="autonomy"><option value="implement_and_review">고친 뒤 내 확인 대기 (권장)</option><option value="research_only">조사만 하고 보고</option><option value="implement_test_wait_for_deploy">고치고 테스트까지, 배포는 대기</option><option value="guarded_auto_deploy">안전장치 걸고 배포까지 자동</option></select></label>
        <label>우선순위<select name="priority"><option value="normal">보통</option><option value="high">중요</option><option value="urgent">긴급</option><option value="low">낮음</option></select></label>
        <div class="modal-actions"><button class="button ghost" type="button" data-dialog-close="taskDialog">취소</button><button class="button primary" id="taskSubmit" value="default">등록하고 대기열에 넣기</button></div>
      </form>
    </dialog>

    <dialog class="modal" id="recordDialog" aria-labelledby="dialogTitle">
      <form method="dialog" id="recordForm">
        <div class="modal-head"><div><small id="dialogEyebrow">기록</small><h2 id="dialogTitle">새 기록</h2></div><button class="icon-button" type="button" data-dialog-close="recordDialog" aria-label="닫기">×</button></div>
        <input type="hidden" name="collection" id="recordCollection" />
        <label>제목<input name="title" id="recordTitle" required maxlength="120" /></label>
        <label>관련 앱<select name="appId" id="recordApp"><option value="">회사 전체</option></select></label>
        <label>내용<textarea name="body" id="recordBody" rows="5" maxlength="4000" placeholder="확인된 사실과 결정 이유를 적어 주세요."></textarea></label>
        <label>우선순위<select name="priority"><option value="normal">보통</option><option value="high">중요</option><option value="urgent">긴급</option><option value="low">낮음</option></select></label>
        <div class="modal-actions"><button class="button ghost" type="button" data-dialog-close="recordDialog">취소</button><button class="button primary" id="recordSubmit" value="default">저장</button></div>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
