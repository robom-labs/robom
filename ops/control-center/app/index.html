<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#173f5f" />
    <title>로봄 본부 · ROBOM Control Center</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="hq">
      <header class="topbar">
        <div class="brand">
          <img class="brand-mark" src="./icon.svg" alt="" aria-hidden="true" />
          <div class="brand-copy"><strong>로봄 본부</strong><small>ROBOM Control Center</small></div>
        </div>
        <div class="top-right">
          <span class="light" id="companyLight" aria-live="polite"><i></i><b>—</b></span>
          <button class="refresh" id="refreshBtn" type="button" aria-label="새로고침">↻</button>
        </div>
      </header>

      <nav class="side-nav" aria-label="본부 메뉴">
        <button class="nav-item active" type="button" data-screen="today"><span aria-hidden="true">◎</span>오늘의 로봄</button>
        <button class="nav-item" type="button" data-screen="org"><span aria-hidden="true">▤</span>조직도</button>
        <button class="nav-item" type="button" data-screen="staff"><span aria-hidden="true">☰</span>직원 상황실</button>
        <button class="nav-item" type="button" data-screen="apps"><span aria-hidden="true">▦</span>앱 관제</button>
        <button class="nav-item" type="button" data-screen="approvals"><span aria-hidden="true">✔</span>승인함</button>
        <button class="nav-item" type="button" data-screen="log"><span aria-hidden="true">≡</span>활동 로그</button>
      </nav>

      <main id="screen" class="screen" aria-live="polite"><div class="loading">불러오는 중…</div></main>

      <nav class="tabbar" aria-label="하단 메뉴">
        <button class="tab active" type="button" data-screen="today"><span aria-hidden="true">◎</span>오늘</button>
        <button class="tab" type="button" data-screen="staff"><span aria-hidden="true">☰</span>직원</button>
        <button class="tab" type="button" data-screen="apps"><span aria-hidden="true">▦</span>앱</button>
        <button class="tab" type="button" data-screen="approvals"><span aria-hidden="true">✔</span>승인</button>
        <button class="tab" type="button" data-screen="log"><span aria-hidden="true">≡</span>로그</button>
      </nav>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
