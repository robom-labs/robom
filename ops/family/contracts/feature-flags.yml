# 앱별 실험을 작게 유지하고 즉시 되돌릴 수 있게 하는 공통 flag 계약이다.
version: 1.0.0
provider_optional: true
default_variant: control
max_concurrent_per_app: 1
required_fields: [key, app_id, control, variant, start_at, end_at, success_metric, rollback]
forbidden_experiments: [accessibility-reduction, alert-reliability, privacy-expansion, sensitive-data-collection]
