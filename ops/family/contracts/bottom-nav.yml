# 하단 메뉴의 크기·접근성·안전 영역·의미 규칙을 정의한다. (Family UI OS v1.1)
# 값 뒤 인라인 주석을 두지 않는다(check-family-ui의 scalar 정확 매칭 계약).
version: 1.1.0
# 크기·안전영역 (v1.0 유지)
min_touch_target: 48px
height: 72px
min_tabs: 3
max_tabs: 5
safe_area_bottom: true
content_padding_required: true
text_symbol_icons_forbidden: true
# v1.1 의미 계약 — 해시 동기화만으로는 보장 못 하던 순서·상태·접근성 의미를 명시한다.
# 각 탭 label 항상 표시(아이콘만 금지)
visible_labels_required: true
# 설정 탭 필수
settings_required: true
# 설정은 언제나 마지막
settings_position: last
# 알림 탭이 있으면 설정 바로 앞
notifications_position: immediately-before-settings-if-present
# 공통 SVG/vector 아이콘, emoji 주아이콘 금지
icon_format: svg-symbol-or-equivalent-vector
# 활성 상태는 색+배경/텍스트/shape 등 색 외 신호 병행
active_state_not_color_only: true
# badge는 실제 개수·상태가 있을 때만
badge_requires_real_state: true
# 키보드 포커스·활성 의미 제공
keyboard_semantics_required: true
# 스크린리더 접근명 제공
screen_reader_name_required: true
# 탭 순서가 실행마다 바뀌지 않음
tab_order_stable: true
