# robom 패밀리 허브를 생성물 검증·정적 프리렌더·운영 smoke와 함께 GitHub Pages에 배포한다.
name: Deploy robom site to Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "ops/registry/apps.yml"
      - "ops/family/**"
      - "ops/scripts/check-app-registry.mjs"
      - "ops/scripts/lib/**"
      - "ops/scripts/family/**"
      - ".github/workflows/deploy-site-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-site-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - name: Production dependency audit
        run: npm run audit:prod
      - name: Registry·family drift·QR decode
        run: node ../ops/scripts/check-app-registry.mjs && npm run family:verify
      - name: Build·rendered HTML 검사
        run: NEXT_PUBLIC_BUILD_SHA=${GITHUB_SHA} npm test
      - name: Chromium·WebKit 설치
        run: npx playwright install --with-deps chromium webkit
      - name: 모바일·설치 E2E Chromium
        run: NEXT_PUBLIC_BUILD_SHA=${GITHUB_SHA} npm run test:e2e
      - name: 모바일·설치 E2E WebKit
        run: NEXT_PUBLIC_BUILD_SHA=${GITHUB_SHA} BROWSER=webkit npm run test:e2e
      - name: GitHub Pages 정적 프리렌더
        run: GITHUB_SHA=${GITHUB_SHA} node scripts/prerender-static.mjs
      - name: 실패 화면 업로드
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: robom-site-e2e-screenshots
          path: site/screenshots/family-final/
          if-no-files-found: ignore
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site/dist/static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: robom.kr 운영 도메인·TLS·QR-only 게이트
        shell: bash
        run: |
          set -u
          BASE="https://robom.kr/"
          EXPECTED_IDS="$(node -e 'const fs=require("fs"); process.stdout.write([...fs.readFileSync("ops/registry/apps.yml", "utf8").matchAll(/^  - id: ([a-z0-9-]+)$/gm)].map(([, id]) => id).join(" "))')"
          EXPECTED_COUNT="$(wc -w <<<"${EXPECTED_IDS}" | tr -d ' ')"
          test "${EXPECTED_COUNT}" -eq 4

          for attempt in 1 2 3 4 5 6; do
            HOME="$(curl -fsS --max-time 25 "${BASE}" || true)"
            HTTP_CODE="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 25 "${BASE}" || true)"
            FINAL_URL="$(curl -sS -o /dev/null -w '%{url_effective}' --max-time 25 "${BASE}" || true)"
            APPS_STATUS="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 25 "${BASE}apps/" || true)"
            CERTIFICATE="$(openssl s_client -connect robom.kr:443 -servername robom.kr </dev/null 2>/dev/null | openssl x509 -noout -ext subjectAltName 2>/dev/null || true)"

            ok=true
            test "${HTTP_CODE}" = "200" || ok=false
            test "${FINAL_URL}" = "${BASE}" || ok=false
            test "${APPS_STATUS}" = "404" || ok=false
            grep -q "준비 중" <<<"${HOME}" || ok=false
            grep -q "2026년 8월 초 출시 예정" <<<"${HOME}" || ok=false
            grep -q "${GITHUB_SHA::7}" <<<"${HOME}" || ok=false
            grep -q "DNS:robom.kr" <<<"${CERTIFICATE}" || ok=false
            grep -q "SoftwareApplication" <<<"${HOME}" && ok=false
            grep -Eqi 'rel=[^>]*manifest' <<<"${HOME}" && ok=false
            grep -q "serviceWorker.register" <<<"${HOME}" && ok=false

            for id in ${EXPECTED_IDS}; do
              INSTALL="$(curl -fsS --max-time 25 "${BASE}get/${id}/" || true)"
              QR="$(curl -fsS --max-time 25 "${BASE}install/qr/${id}.svg" || true)"
              grep -q "install/qr/${id}.svg" <<<"${HOME}" || ok=false
              grep -q "robom.kr/get/${id}" <<<"${HOME}" || ok=false
              grep -q "준비 중" <<<"${INSTALL}" || ok=false
              grep -q "2026년 8월 초 출시 예정" <<<"${INSTALL}" || ok=false
              grep -q "robom.kr/get/${id}" <<<"${INSTALL}" || ok=false
              grep -q "<svg" <<<"${QR}" || ok=false
            done

            if ${ok}; then
              exit 0
            fi
            sleep 10
          done
          exit 1
