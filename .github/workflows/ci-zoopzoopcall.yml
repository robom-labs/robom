# zoopzoopcall(Vite PWA) — apps/zoopzoopcall 가 바뀔 때만 실행.
name: CI · zoopzoopcall

on:
  pull_request:
    paths:
      - "apps/zoopzoopcall/**"

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/zoopzoopcall } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm, cache-dependency-path: apps/zoopzoopcall/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
