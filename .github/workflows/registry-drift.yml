name: Registry drift

on:
  schedule:
    - cron: "17 21 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
        working-directory: site
      - run: node ops/scripts/check-app-registry.mjs
      - run: npm run family:verify
        working-directory: site
