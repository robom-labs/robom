# 비공개 집계 endpoint가 연결된 경우 주간·월간 성장 보고서를 Actions artifact로 생성한다.
name: Private growth reports

on:
  schedule:
    - cron: "17 0 * * 1"
    - cron: "37 0 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      GROWTH_AGGREGATE_URL: ${{ secrets.GROWTH_AGGREGATE_URL }}
      GROWTH_AGGREGATE_TOKEN: ${{ secrets.GROWTH_AGGREGATE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: 외부 credential 상태
        id: credential
        shell: bash
        run: |
          if [ -z "$GROWTH_AGGREGATE_URL" ] || [ -z "$GROWTH_AGGREGATE_TOKEN" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "BLOCKED_EXTERNAL: 비공개 집계 endpoint credential이 아직 없습니다." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - name: 개인정보가 제거된 집계만 가져오기
        if: steps.credential.outputs.ready == 'true'
        run: curl --fail --silent --show-error --header "Authorization: Bearer $GROWTH_AGGREGATE_TOKEN" "$GROWTH_AGGREGATE_URL" --output /tmp/robom-growth-aggregate.json
      - name: 보고서 생성
        if: steps.credential.outputs.ready == 'true'
        run: node ops/scripts/family/generate-growth-report.mjs --input /tmp/robom-growth-aggregate.json --output /tmp/robom-growth-report.md
      - name: 보고서 artifact 업로드
        if: steps.credential.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: private-growth-report-${{ github.run_id }}
          path: /tmp/robom-growth-report.md
          retention-days: 90
