# pushrun(정적) — apps/pushrun 가 바뀔 때만 실행.
name: CI · pushrun

on:
  pull_request:
    paths:
      - "apps/pushrun/**"

permissions:
  contents: read

jobs:
  static-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: 필수 산출물 존재
        run: |
          for f in index.html app.js races.json styles.css manifest.webmanifest sw.js icon.svg; do
            test -f "apps/pushrun/outputs/pushrun-site/$f" \
              || { echo "::error::pushrun 산출물 누락: $f"; exit 1; }
          done
      - name: JavaScript 문법 검사
        run: node --check apps/pushrun/outputs/pushrun-site/app.js && node --check apps/pushrun/outputs/pushrun-site/sw.js
      - name: 정적 자산·대회 데이터 검사
        working-directory: apps/pushrun
        run: npm test
