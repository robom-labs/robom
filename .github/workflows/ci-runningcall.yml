# runningcall(Next.js) — apps/runningcall 가 바뀔 때만 실행.
# 원본 저장소 CI가 정본이며, holdings 사본 변경 시에도 동일 검증을 반복한다.
name: CI · runningcall

on:
  pull_request:
    paths:
      - "apps/runningcall/**"

permissions:
  contents: read

jobs:
  typecheck-test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/runningcall } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.17.1 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm, cache-dependency-path: apps/runningcall/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm audit --prod --audit-level high
